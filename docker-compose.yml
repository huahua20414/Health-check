services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: health_checkup
      MYSQL_USER: health
      MYSQL_PASSWORD: health123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uhealth", "-phealth123"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      DB_DSN: "health:health123@tcp(mysql:3306)/health_checkup?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "health-checkup-local-secret"
      SMTP_HOST: "${SMTP_HOST:-smtp.qq.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      DEV_AUTH_ENABLED: "${DEV_AUTH_ENABLED:-false}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_PROXY_TARGET: "http://backend:8080"
      VITE_API_BASE: "/api"
      VITE_DEV_AUTH: "${VITE_DEV_AUTH:-false}"
    depends_on:
      - backend
    ports:
      - "5174:5174"

volumes:
  mysql_data:
