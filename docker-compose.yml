services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: health_checkup
      MYSQL_USER: health
      MYSQL_PASSWORD: health123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uhealth", "-phealth123"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      DB_DSN: "health:health123@tcp(mysql:3306)/health_checkup?charset=utf8mb4&parseTime=True&loc=Local"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: "/api"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
